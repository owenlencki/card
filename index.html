<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owen Lencki</title>
  <meta name="description" content="AI automation and web development. Get in touch with Owen Lencki.">
  <meta name="theme-color" content="#7A2838">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    :root {
      --maroon: #7A2838;
      --maroon-hover: #632030;
      --maroon-light: rgba(122, 40, 56, 0.07);
      --bg: #FAF7F5;
      --surface: #FFFFFF;
      --text: #1C1517;
      --text-2: #5E4E52;
      --text-3: #998B8E;
      --border: #E8E0E2;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      line-height: 1.5;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Photo + Identity ── */
    .identity {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .avatar-ring {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--maroon), #A3455A);
      box-shadow: 0 4px 20px rgba(122, 40, 56, 0.15);
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid var(--bg);
    }
    .name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }
    .role {
      font-size: 0.9375rem;
      color: var(--text-2);
      font-weight: 500;
    }
    .role .accent { color: var(--maroon); }
    .tagline {
      font-size: 0.875rem;
      color: var(--text-3);
      max-width: 280px;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    /* ── Action Buttons ── */
    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 180ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:hover {
      border-color: var(--maroon);
      background: #FEFBFB;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(122, 40, 56, 0.08);
    }
    .action-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .action-btn .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .action-btn .icon svg { width: 20px; height: 20px; }
    .icon-maroon {
      background: var(--maroon-light);
      color: var(--maroon);
    }
    .icon-muted {
      background: rgba(28, 21, 23, 0.05);
      color: var(--text-2);
    }
    .action-btn .label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .action-btn .sub {
      font-size: 0.75rem;
      color: var(--text-3);
      font-weight: 400;
    }

    /* ── Text Me (primary) ── */
    .text-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: var(--maroon);
      color: #FAF7F5;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: all 180ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .text-btn:hover {
      background: var(--maroon-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(122, 40, 56, 0.25);
    }
    .text-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(122, 40, 56, 0.15);
    }
    .text-btn svg { width: 20px; height: 20px; }
    .text-hint {
      font-size: 0.8125rem;
      color: var(--text-3);
      text-align: center;
      margin-top: -18px;
    }

    /* ── Save Contact (secondary) ── */
    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      color: var(--text-2);
      border: 1px dashed var(--border);
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: all 180ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:hover {
      border-color: var(--text-3);
      color: var(--text);
    }
    .save-btn:active { transform: translateY(0); }
    .save-btn svg { width: 18px; height: 18px; }

    /* ── Show QR (secondary) ── */
    .qr-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: var(--surface);
      color: var(--maroon);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: all 180ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .qr-btn:hover {
      border-color: var(--maroon);
      background: #FEFBFB;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(122, 40, 56, 0.08);
    }
    .qr-btn:active { transform: translateY(0); box-shadow: none; }
    .qr-btn svg { width: 19px; height: 19px; }

    /* ── Footer ── */
    .footer { text-align: center; padding-top: 8px; }
    .footer p {
      font-size: 0.75rem;
      color: var(--text-3);
      letter-spacing: 0.02em;
    }
    .footer a {
      color: var(--text-2);
      text-decoration: none;
    }
    .footer a:hover { color: var(--maroon); }

    /* ── Focus ── */
    .action-btn:focus-visible,
    .save-btn:focus-visible {
      outline: 2px solid var(--maroon);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .action-btn, .save-btn { transition: none; }
      .action-btn:hover, .save-btn:hover { transform: none; }
    }
  </style>
</head>
