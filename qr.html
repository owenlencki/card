      --text: #1C1517;
      --text-2: #5E4E52;
      --text-3: #998B8E;
      --border: #E8E0E2;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #FFFFFF 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 20px; line-height: 1.5;
    }
    .wrap { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center; }
    .head { display: flex; flex-direction: column; gap: 6px; }
    .name { font-family: 'Fraunces', Georgia, serif; font-size: 1.75rem; font-weight: 600; letter-spacing: -0.03em; }
    .role { font-size: 0.9375rem; color: var(--text-2); font-weight: 500; }
    .role .accent { color: var(--maroon); }
    .frame {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 40px rgba(122, 40, 56, 0.13);
    }
    .qr { width: 100%; height: auto; display: block; }
    .hint { font-size: 0.8125rem; color: var(--text-3); display: flex; align-items: center; gap: 7px; }
    .hint svg { width: 16px; height: 16px; }
    .url { font-size: 0.8125rem; color: var(--maroon); font-weight: 600; letter-spacing: 0.01em; }
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 22px; border-radius: 12px;
      background: var(--maroon); color: #FAF7F5;
      text-decoration: none; font-size: 0.9375rem; font-weight: 600;
      transition: all 180ms ease-out; -webkit-tap-highlight-color: transparent;
    }
    .back:hover { background: var(--maroon-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(122,40,56,0.25); }
    .back svg { width: 18px; height: 18px; }
    @media (prefers-reduced-motion: reduce) { .back { transition: none; } .back:hover { transform: none; } }
  </style>
